# /etc/nixos/config/programs/hyprlock/hyprlock.conf
# "CLEAN WINDOWS" STYLE - CATPPUCCIN MOCHA

# ============================================================================
# CATPPUCCIN MOCHA PALETTE
# ============================================================================
$base       = rgb(30, 30, 46)
$mantle     = rgb(24, 24, 37)
$crust      = rgb(17, 17, 27)
$text       = rgb(205, 214, 244)
$subtext1   = rgb(186, 194, 222)
$subtext0   = rgb(166, 173, 200)
$overlay0   = rgb(108, 112, 134)
$surface0   = rgb(49, 50, 68)
$surface1   = rgb(69, 71, 90)
$lavender   = rgb(180, 190, 254)
$mauve      = rgb(203, 166, 247)
$sapphire   = rgb(116, 199, 236)
$blue       = rgb(137, 180, 250)
$sky        = rgb(137, 220, 235)
$teal       = rgb(148, 226, 213)
$green      = rgb(166, 227, 161)
$peach      = rgb(250, 179, 135)
$rosewater  = rgb(245, 224, 220)
$flamingo   = rgb(242, 205, 205)
$pink       = rgb(245, 194, 231)
$red        = rgb(243, 139, 168)

# ============================================================================
# GENERAL
# ============================================================================
general {
    no_fade_in           = false
    grace                = 0
    disable_loading_bar  = true
    hide_cursor          = true
    ignore_empty_input   = true
    text_trim            = true
}

# ============================================================================
# BACKGROUND
# ============================================================================
background {
    monitor      =
    path         = screenshot
    color        = rgba(30, 30, 46, 0.85)
    
    blur_passes  = 4
    blur_size    = 5
    noise        = 0.01
    contrast     = 0.9
    brightness   = 0.55
    vibrancy     = 0.17
    vibrancy_darkness = 0.0
}

# ============================================================================
# TIME (Top Section)
# ============================================================================
label {
    monitor      =
    text         = cmd[update:1000] echo "$(date +"%H:%M")"
    color        = $text
    font_size    = 120
    font_family  = JetBrains Mono Nerd Font ExtraBold
    position     = 0, 150
    halign       = center
    valign       = center
}

# ============================================================================
# DATE (Below Time)
# ============================================================================
label {
    monitor      =
    text         = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color        = $subtext0
    font_size    = 18
    font_family  = JetBrains Mono Nerd Font Bold
    position     = 0, 40
    halign       = center
    valign       = center
}

# ============================================================================
# INPUT FIELD (Pill Shape)
# ============================================================================
input-field {
    monitor      =
    size         = 220, 35
    outline_thickness = 2
    dots_size    = 0.2
    dots_spacing = 0.2
    dots_center  = true
    dots_rounding = -1
    
    # Pill Shape
    rounding     = -1

    # Colors
    outer_color  = $mauve
    inner_color  = $surface0
    font_color   = $text
    
    fade_on_empty = false
    fade_timeout = 1000
    placeholder_text = <span foreground="##cad3f5"><i>password...</i></span>
    hide_input   = false
    
    check_color  = $green
    fail_color   = $red
    fail_text    = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = $peach
    
    # Lifted up to make room for the bottom dock
    position     = 0, 120
    halign       = center
    valign       = bottom
}

# ============================================================================
# BOTTOM DOCK (The Pill Background)
# ============================================================================
shape {
    monitor      =
    size         = 500, 50  # Wide enough to fit both widgets
    color        = rgba(24, 24, 37, 0.6) # Mantle with opacity
    rounding     = -1
    border_size  = 1
    border_color = rgba(203, 166, 247, 0.3) # Mauve with low opacity
    rotate       = 0
    xray         = false

    position     = 0, 40
    halign       = center
    valign       = bottom
    zindex       = 1
}

# ============================================================================
# USER WIDGET (Left side of the pill)
# ============================================================================
label {
    monitor      =
    text         =   $USER
    color        = $mauve
    font_size    = 12
    font_family  = JetBrains Mono Nerd Font Bold
    
    # Offset to the LEFT inside the pill
    # We use center alignment, but move X to -200
    position     = -185, 56
    halign       = center
    valign       = bottom
    zindex       = 5
}

# ============================================================================
# BATTERY & LAYOUT (Right side of the pill)
# ============================================================================
label {
    monitor      =
    text         = cmd[update:1000] echo "<span>󰌌  $(~/.config/hypr/hyprlock/scripts/layout.sh)</span>   <span foreground='##6c7086'>|</span>   <span>$(~/.config/hypr/hyprlock/scripts/battery.sh)</span>"
    color        = $subtext0
    font_size    = 12
    font_family  = JetBrains Mono Nerd Font Bold
    
    # Offset to the RIGHT inside the pill
    # We use center alignment, but move X to 160
    position     = 160, 56
    halign       = center
    valign       = bottom
    zindex       = 5
}
